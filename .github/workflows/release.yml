name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Tests must pass on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm test

  docker-build:
    name: Docker build (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build for amd64 and arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false

  docker-smoke-test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
      - name: Build image
        run: docker build -t hass-odps:smoke .
      - name: Run and verify startup
        run: |
          docker run -d --name smoke-test -p 3000:3000 hass-odps:smoke
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/login -o /dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Server failed to become ready. Logs:"
              docker logs smoke-test
              docker rm -f smoke-test
              exit 1
            fi
            sleep 1
          done
          docker stop smoke-test
          docker rm smoke-test

  version:
    name: Bump version
    needs: [test, docker-build, docker-smoke-test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install yq
        uses: mikefarah/yq@557dcb87b8efe786f89a12c09e9046b4753ab72e # v4.44.1

      - name: Patch config.yaml and package.json
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          yq e '.version = env(VERSION)' -i config.yaml
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.yaml package.json package-lock.json
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore: bump version to ${{ steps.resolve.outputs.version }} [skip ci]"
          git push origin main

  build:
    name: Build & push images
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: home-assistant/builder@2024.03.5
        with:
          args: >-
            --all
            --target /data
            --docker-hub ghcr.io/${{ github.repository_owner }}
            --addon

  changelog:
    name: Update CHANGELOG.md
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Generate release notes via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST \
            --field tag_name="v${VERSION}" \
            --field target_commitish=main \
            --jq '.body' > /tmp/release_notes.md

      - name: Build HA-format changelog entry
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          {
            echo "## ${VERSION}"
            echo ""
            grep '^\* ' /tmp/release_notes.md \
              | grep -v 'made their first contribution' \
              | sed 's/^\* /- /' \
              | sed 's/ by @[^ ]* in https:\/\/[^ ]*$//'
            echo ""
          } > /tmp/new_entry.md

      - name: Prepend entry to CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            cat /tmp/new_entry.md CHANGELOG.md > /tmp/CHANGELOG.md
          else
            cp /tmp/new_entry.md /tmp/CHANGELOG.md
          fi
          mv /tmp/CHANGELOG.md CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore: update CHANGELOG.md for v${{ needs.version.outputs.version }} [skip ci]"
          git push origin main

  release:
    name: Create GitHub Release
    needs: [version, build, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
