name: "HASS-ODPS Book Server"
description: "OPDS 1.2 book catalog, KOSync progress sync, and web library manager for KoReader"
version: "1.2.7"
slug: "hass-odps"
image: "ghcr.io/korzun/hass-odps-{arch}"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Book server — OPDS, KOSync, Web UI"
map:
  - media:rw
  - data:rw
options:
  library_name: HASS-ODPS
  username: admin
  password: changeme
  max_concurrent_uploads: 3
schema:
  library_name: str
  username: str
  password: str
  max_concurrent_uploads: int
