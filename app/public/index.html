<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HASS-ODPS Library</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f3f4f6;color:#111;min-height:100vh}
    header{background:#1e40af;color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
    header h1{font-size:1.25rem}
    .signout{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:4px;padding:.375rem .75rem;cursor:pointer;font-size:.875rem}
    .signout:hover{background:rgba(255,255,255,.1)}
    main{max-width:800px;margin:2rem auto;padding:0 1rem}
    /* Tab bar */
    #tab-bar{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:1.5rem}
    .tab{background:transparent;border:none;padding:.625rem 1.25rem;cursor:pointer;font-size:.9rem;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit}
    .tab.active{color:#1e40af;border-bottom-color:#1e40af;font-weight:500}
    .tab:hover:not(.active){color:#374151}
    /* Library */
    #drop-zone{border:2px dashed #93c5fd;border-radius:8px;padding:2rem;text-align:center;cursor:pointer;background:#eff6ff;margin-bottom:2rem;transition:background .15s}
    #drop-zone.over{background:#dbeafe;border-color:#3b82f6}
    #drop-zone p{color:#1d4ed8;margin-bottom:.5rem}
    #drop-zone small{color:#6b7280}
    #file-input{display:none}
    #upload-status{margin-top:.75rem;font-size:.875rem;min-height:1.25rem}
    .status-ok{color:#16a34a}
    .status-err{color:#dc2626}
    #book-list{list-style:none}
    #book-list li{background:#fff;border-radius:6px;padding:.75rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .book-cover{flex-shrink:0}
    .book-info{flex:1;min-width:0}
    .book-title{font-weight:500;margin-bottom:.125rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .book-meta{font-size:.75rem;color:#6b7280;margin-bottom:.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .book-format{font-size:.75rem;color:#9ca3af}
    .delete-btn{background:transparent;border:none;cursor:pointer;color:#9ca3af;font-size:1.1rem;padding:.25rem .5rem;border-radius:4px;transition:color .15s}
    .delete-btn:hover{color:#dc2626}
    #empty-msg{color:#6b7280;text-align:center;padding:2rem}
    /* Users */
    #user-list{list-style:none}
    #users-empty{color:#6b7280;text-align:center;padding:2rem}
    .user-row{background:#fff;border-radius:6px;margin-bottom:.5rem;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
    .user-header{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;cursor:pointer;user-select:none}
    .user-header:hover{background:#f9fafb}
    .user-chevron{font-size:.7rem;color:#9ca3af;width:12px;flex-shrink:0}
    .user-name{flex:1;font-weight:500}
    .user-meta{font-size:.75rem;color:#6b7280}
    .progress-list{list-style:none;background:#f8fafc;border-top:1px solid #e5e7eb}
    .progress-item{display:grid;grid-template-columns:1fr auto auto;gap:.25rem .75rem;padding:.5rem 1rem .5rem 2.25rem;border-bottom:1px solid #eef2f7}
    .progress-item:last-child{border-bottom:none}
    .prog-doc{font-size:.8rem;color:#374151;grid-column:1;word-break:break-all}
    .prog-pct{font-size:.8rem;color:#16a34a;font-weight:500;grid-column:2;text-align:right;white-space:nowrap}
    .prog-meta{font-size:.7rem;color:#9ca3af;grid-column:1/4}
    .progress-empty{padding:.5rem 1rem .5rem 2.25rem;font-size:.8rem;color:#9ca3af;display:block}
    /* Series groups */
    .series-row{background:#fff;border-radius:6px;padding:.75rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;border:1px solid transparent}
    .series-row:hover{border-color:#bfdbfe}
    #book-list li.series-row{gap:.9rem}
    .series-info{flex:1;min-width:0}
    .series-name{font-weight:600;font-size:.92rem;color:#111;margin-bottom:.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .series-meta{font-size:.75rem;color:#6b7280;margin-bottom:.1rem}
    .series-link{font-size:.7rem;color:#1e40af;font-weight:500}
    /* Standalone section */
    .standalone-section{margin-top:1.25rem}
    .standalone-header{display:flex;align-items:center;gap:.5rem;padding:.5rem .25rem;cursor:pointer;user-select:none;margin-bottom:.4rem}
    .standalone-chevron{font-size:.65rem;color:#9ca3af;width:12px;flex-shrink:0}
    .standalone-label{font-size:.75rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
    .standalone-count{font-size:.7rem;color:#9ca3af;margin-left:.25rem}
    /* Series page */
    .series-hero{background:#1e40af;padding:1rem 1.5rem;display:flex;align-items:flex-end;gap:1rem;border-radius:6px;margin-bottom:.75rem}
    .series-hero-badge{font-size:.65rem;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem}
    .series-hero-title{font-size:1.1rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.2rem}
    .series-hero-meta{font-size:.75rem;color:rgba(255,255,255,.75)}
    .series-back{background:none;border:none;color:#1e40af;font-size:.8rem;font-weight:500;cursor:pointer;padding:0;font-family:inherit;display:inline-block;margin:.75rem 0}
    .series-back:hover{text-decoration:underline}
    .series-order-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:.45rem}
    body.user-mode .admin-only{display:none!important}
    body:not(.user-mode) .user-only{display:none!important}
    .clear-btn:hover{color:#dc2626}
  </style>
</head>
<body>
  <header>
    <h1>📚 HASS-ODPS Library</h1>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span id="current-username" style="font-size:.875rem;opacity:.85"></span>
      <form method="POST" action="/logout" style="margin:0">
        <button class="signout">Sign Out</button>
      </form>
    </div>
  </header>

  <nav id="tab-bar">
    <button class="tab active" data-tab="library">Library</button>
    <button class="tab admin-only" data-tab="users">Users</button>
  </nav>

  <main>
    <div id="library-section">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem">
        <button id="scan-btn" type="button" class="admin-only" style="background:#1e40af;color:#fff;border:none;border-radius:4px;padding:.5rem 1rem;font-size:.875rem;cursor:pointer;font-family:inherit">Scan Library</button>
        <span id="scan-status" style="font-size:.875rem;min-height:1.25rem;display:inline-block"></span>
      </div>
      <div id="drop-zone">
        <input type="file" id="file-input" accept=".epub" multiple>
        <p>Drop books here or <label for="file-input" style="text-decoration:underline;cursor:pointer">click to upload</label></p>
        <small>Supported format: epub</small>
        <div id="upload-status"></div>
      </div>
      <ul id="book-list"></ul>
      <p id="empty-msg" style="display:none">No books yet. Upload some above.</p>
    </div>

    <div id="users-section" class="admin-only" style="display:none">
      <div id="register-user-form" style="background:#fff;border-radius:6px;padding:.75rem 1rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.07)">
        <div style="font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em">Register User</div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-start">
          <input id="reg-username" type="text" placeholder="Username" autocomplete="off" style="flex:1;min-width:120px;padding:.4rem .6rem;border:1px solid #d1d5db;border-radius:4px;font-size:.875rem;font-family:inherit">
          <input id="reg-password" type="password" placeholder="Password" autocomplete="new-password" style="flex:1;min-width:120px;padding:.4rem .6rem;border:1px solid #d1d5db;border-radius:4px;font-size:.875rem;font-family:inherit">
          <button id="reg-btn" type="button" style="background:#1e40af;color:#fff;border:none;border-radius:4px;padding:.4rem .9rem;font-size:.875rem;cursor:pointer;font-family:inherit;white-space:nowrap">Register</button>
        </div>
        <div id="reg-status" style="margin-top:.4rem;font-size:.8rem;min-height:1rem"></div>
      </div>
      <ul id="user-list"></ul>
      <p id="users-empty" style="display:none">No KOSync users registered yet.</p>
    </div>

    <div id="series-section" style="display:none"></div>
  </main>

  <script>
    // ── Tabs ──────────────────────────────────────────────
    const librarySection = document.getElementById('library-section');
    const usersSection = document.getElementById('users-section');
    const seriesSection = document.getElementById('series-section');
    let usersLoaded = false;
    let currentSeriesName = null;

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const name = tab.dataset.tab;
        seriesSection.style.display = 'none';
        currentSeriesName = null;
        librarySection.style.display = name === 'library' ? '' : 'none';
        usersSection.style.display = name === 'users' ? '' : 'none';
        if (name === 'users' && !usersLoaded) loadUsers();
      });
    });

    // ── Library ───────────────────────────────────────────
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const bookList = document.getElementById('book-list');
    const uploadStatus = document.getElementById('upload-status');
    const emptyMsg = document.getElementById('empty-msg');

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function groupBooks(books) {
      const seriesMap = new Map();
      const standalone = [];
      for (const book of books) {
        if (book.series) {
          if (!seriesMap.has(book.series)) seriesMap.set(book.series, []);
          seriesMap.get(book.series).push(book);
        } else {
          standalone.push(book);
        }
      }
      for (const [, bks] of seriesMap) {
        bks.sort((a, b) => (a.seriesIndex ?? 0) - (b.seriesIndex ?? 0));
      }
      const sortedSeries = [...seriesMap.entries()].sort(([a], [b]) => a.localeCompare(b));
      standalone.sort((a, b) => a.title.localeCompare(b.title));
      return { series: sortedSeries, standalone };
    }

    function seriesProgressPct(books) {
      if (!books.some(b => progressMap.has(b.id))) return null;
      const avg = books.reduce((sum, b) => sum + (progressMap.get(b.id) ?? 0), 0) / books.length;
      return Math.round(avg * 100);
    }

    const LIST_STACK_OFFSETS = [
      { left: 10, top: 5, rotate: '-6deg' },   // back
      { left: 5,  top: 2, rotate: '-2deg' },   // middle
      { left: 0,  top: 0, rotate:  '0deg' },   // front
    ];

    const HERO_STACK_OFFSETS = [
      { left: 13, top: 6, rotate: '-6deg' },
      { left: 6,  top: 3, rotate: '-2deg' },
      { left: 0,  top: 0, rotate:  '0deg' },
    ];

    // books: array sorted ascending by seriesIndex.
    // offsets: [{left, top, rotate}] indexed back→front (index 0 = back).
    // Returns an HTML string for the fanned cover stack container.
    function buildCoverStack(books, cw, ch, lw, lh, offsets) {
      // Map books to layers: front book (books[0]) goes to the front position (index 2),
      // books[1] to middle (index 1), books[2] to back (index 0).
      const layers = [books[2] || null, books[1] || null, books[0] || null];
      const layerHtml = offsets.map((pos, i) => {
        const book = layers[i];
        const isGhost = !book;
        const opacity = isGhost ? (i === 0 ? '.3' : '.45') : '1';
        const style = 'position:absolute'
          + ';left:' + pos.left + 'px'
          + ';top:' + pos.top + 'px'
          + ';width:' + lw + 'px'
          + ';height:' + lh + 'px'
          + ';border-radius:2px'
          + ';transform:rotate(' + pos.rotate + ')'
          + ';z-index:' + (i + 1)
          + ';opacity:' + opacity
          + ';box-shadow:1px 1px 3px rgba(0,0,0,.18)';
        if (book && book.hasCover) {
          return '<img src="/api/books/' + esc(book.id) + '/cover" alt="" style="' + style + ';object-fit:cover;display:block">';
        }
        return '<div style="' + style + ';background:#d1d5db"></div>';
      }).join('');
      return '<div style="position:relative;width:' + cw + 'px;height:' + ch + 'px;flex-shrink:0">' + layerHtml + '</div>';
    }

    function renderSeriesRow(seriesName, books) {
      const li = document.createElement('li');
      li.className = 'series-row';
      const author = books[0] ? books[0].author : '';
      const count = books.length;
      const stackHtml = buildCoverStack(books, 58, 74, 44, 62, LIST_STACK_OFFSETS);
      const pct = seriesProgressPct(books);
      const pctHtml = pct != null
        ? ' · <span style="color:#16a34a;font-weight:500">' + pct + '%</span>'
        : '';
      li.innerHTML = stackHtml +
        '<div class="series-info">' +
          '<div class="series-name">' + esc(seriesName) + '</div>' +
          '<div class="series-meta">' +
            (author ? esc(author) + ' · ' : '') +
            count + ' book' + (count !== 1 ? 's' : '') +
            pctHtml +
          '</div>' +
          '<div class="series-link">View series →</div>' +
        '</div>';
      li.addEventListener('click', () => showSeriesPage(seriesName, books));
      return li;
    }

    function renderStandaloneSection(books) {
      const section = document.createElement('div');
      section.className = 'standalone-section';
      section.id = 'standalone-section';

      const header = document.createElement('div');
      header.className = 'standalone-header';
      header.innerHTML =
        '<span class="standalone-chevron">▼</span>' +
        '<span class="standalone-label">Standalone Books</span>' +
        '<span class="standalone-count">' + books.length + ' book' + (books.length !== 1 ? 's' : '') + '</span>';

      const list = document.createElement('ul');
      list.style.listStyle = 'none';
      list.style.padding = '0';
      list.style.margin = '0';

      books.forEach(book => {
        const li = document.createElement('li');
        const coverHtml = book.hasCover
          ? '<img src="/api/books/' + esc(book.id) + '/cover" alt="' + esc(book.title) + '" style="width:40px;height:56px;object-fit:cover;border-radius:2px;display:block;">'
          : '<div style="width:40px;height:56px;background:#e0e0e0;border-radius:2px;"></div>';
        const pct = progressMap.get(book.id);
        const pctHtml = pct != null
          ? '<span style="font-size:.75rem;color:#16a34a;font-weight:500;margin-right:.25rem">' + Math.round(pct * 100) + '%</span>'
          : '';
        li.innerHTML =
          '<div style="display:flex;align-items:center;gap:.75rem;background:#fff;border-radius:6px;padding:.6rem .9rem;margin-bottom:.4rem;box-shadow:0 1px 3px rgba(0,0,0,.07)">' +
            '<div style="flex-shrink:0">' + coverHtml + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div class="book-title">' + esc(book.title) + '</div>' +
              (book.author ? '<div class="book-meta">' + esc(book.author) + '</div>' : '') +
              '<div class="book-format">EPUB · ' + formatSize(book.size) + '</div>' +
            '</div>' +
            pctHtml +
            (pct != null ? '<button class="clear-btn user-only" type="button" title="Clear reading status" style="background:transparent;border:none;cursor:pointer;color:#9ca3af;font-size:.75rem;padding:.25rem .5rem;border-radius:4px;font-family:inherit">Clear</button>' : '') +
            '<button class="delete-btn admin-only" type="button" title="Delete">🗑</button>' +
          '</div>';
        li.querySelector('.delete-btn').addEventListener('click', () => deleteBook(book.id, book.title));
        li.querySelector('.clear-btn').addEventListener('click', () => clearProgress(book.id));
        list.appendChild(li);
      });

      header.addEventListener('click', () => {
        const isOpen = list.style.display !== 'none';
        list.style.display = isOpen ? 'none' : '';
        header.querySelector('.standalone-chevron').textContent = isOpen ? '▶' : '▼';
      });

      section.appendChild(header);
      section.appendChild(list);
      return section;
    }

    function showLibraryView() {
      currentSeriesName = null;
      seriesSection.style.display = 'none';
      librarySection.style.display = '';
    }

    function showSeriesPage(seriesName, books) {
      currentSeriesName = seriesName;
      const author = books[0] ? books[0].author : '';
      const count = books.length;
      const heroStack = buildCoverStack(books, 68, 86, 52, 72, HERO_STACK_OFFSETS);

      seriesSection.innerHTML =
        '<div class="series-hero">' +
          heroStack +
          '<div>' +
            '<div class="series-hero-badge">Series</div>' +
            '<div class="series-hero-title">' + esc(seriesName) + '</div>' +
            '<div class="series-hero-meta">' +
              (author ? esc(author) + ' · ' : '') +
              count + ' book' + (count !== 1 ? 's' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
        '<button class="series-back" type="button">← Library</button>' +
        '<div class="series-order-label">Reading Order</div>' +
        '<ul id="series-book-list" style="list-style:none;padding:0;margin:0"></ul>';

      const seriesBookList = seriesSection.querySelector('#series-book-list');
      books.forEach(book => {
        const li = document.createElement('li');
        const coverHtml = book.hasCover
          ? '<img src="/api/books/' + esc(book.id) + '/cover" alt="' + esc(book.title) + '" style="width:32px;height:46px;object-fit:cover;border-radius:2px;display:block;">'
          : '<div style="width:32px;height:46px;background:#e0e0e0;border-radius:2px;"></div>';
        const pct = progressMap.get(book.id);
        const pctHtml = pct != null
          ? '<span style="font-size:.75rem;color:#16a34a;font-weight:500;margin-right:.25rem">' + Math.round(pct * 100) + '%</span>'
          : '';
        li.innerHTML =
          '<div style="display:flex;align-items:center;gap:.75rem;background:#fff;border-radius:5px;padding:.55rem .75rem;margin-bottom:.35rem;box-shadow:0 1px 3px rgba(0,0,0,.07)">' +
            '<div style="flex-shrink:0">' + coverHtml + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div class="book-title">' + esc(book.title) + '</div>' +
              '<div class="book-format">' +
                (book.seriesIndex != null ? '#' + book.seriesIndex + ' · ' : '') +
                'EPUB · ' + formatSize(book.size) +
              '</div>' +
            '</div>' +
            pctHtml +
            '<button class="clear-btn user-only" type="button" title="Clear reading status" style="background:transparent;border:none;cursor:pointer;color:#9ca3af;font-size:.75rem;padding:.25rem .5rem;border-radius:4px;font-family:inherit">Clear</button>' +
            '<button class="delete-btn admin-only" type="button" title="Delete">🗑</button>' +
          '</div>';
        li.querySelector('.delete-btn').addEventListener('click', () => deleteBook(book.id, book.title));
        li.querySelector('.clear-btn').addEventListener('click', () => clearProgress(book.id));
        seriesBookList.appendChild(li);
      });

      seriesSection.querySelector('.series-back').addEventListener('click', showLibraryView);

      librarySection.style.display = 'none';
      seriesSection.style.display = '';
    }

    async function loadBooks() {
      try {
        const [booksRes, progressRes] = await Promise.all([
          fetch('/api/books'),
          currentUser.isAdmin ? Promise.resolve(null) : fetch('/api/my/progress'),
        ]);
        if (!booksRes.ok) { emptyMsg.style.display = ''; return; }
        const books = await booksRes.json();
        cachedBooks = books;

        const progressList = progressRes && progressRes.ok ? await progressRes.json() : [];
        progressMap = new Map(progressList.map(p => [p.document, p.percentage]));

        bookList.innerHTML = '';
        const oldStandalone = document.getElementById('standalone-section');
        if (oldStandalone) oldStandalone.remove();

        if (books.length === 0) {
          emptyMsg.style.display = '';
          return;
        }
        emptyMsg.style.display = 'none';

        const { series, standalone } = groupBooks(books);

        series.forEach(([seriesName, seriesBooks]) => {
          bookList.appendChild(renderSeriesRow(seriesName, seriesBooks));
        });

        if (standalone.length > 0) {
          librarySection.appendChild(renderStandaloneSection(standalone));
        }
      } catch {
        bookList.innerHTML = '';
        const errStandalone = document.getElementById('standalone-section');
        if (errStandalone) errStandalone.remove();
        emptyMsg.style.display = '';
      }
    }

    async function deleteBook(id, title) {
      if (!confirm(`Delete "${title}"?`)) return;
      const res = await fetch(`/api/books/${id}`, { method: 'DELETE' });
      if (res.status === 204) {
        if (currentSeriesName !== null) {
          await refreshSeriesPage();
        } else {
          await loadBooks();
        }
      } else {
        alert('Failed to delete book.');
      }
    }

    async function clearProgress(bookId) {
      const res = await fetch('/api/my/progress/' + encodeURIComponent(bookId), { method: 'DELETE' });
      if (res.status === 204) {
        progressMap.delete(bookId);
        if (currentSeriesName !== null) {
          const { series } = groupBooks(cachedBooks);
          const entry = series.find(([name]) => name === currentSeriesName);
          if (entry) showSeriesPage(currentSeriesName, entry[1]);
          else await loadBooks();
        } else {
          await loadBooks();
        }
      } else {
        alert('Failed to clear reading status.');
      }
    }

    async function refreshSeriesPage() {
      try {
        const res = await fetch('/api/books');
        if (!res.ok) { await loadBooks(); showLibraryView(); return; }
        const allBooks = await res.json();
        const { series } = groupBooks(allBooks);
        const entry = series.find(([name]) => name === currentSeriesName);
        if (entry) {
          showSeriesPage(currentSeriesName, entry[1]);
        } else {
          await loadBooks();
          showLibraryView();
        }
      } catch {
        showLibraryView();
      }
    }

    async function uploadFiles(files) {
      if (!files.length) return;
      uploadStatus.textContent = `Uploading ${files.length} file(s)…`;
      uploadStatus.className = '';
      const fd = new FormData();
      for (const f of files) fd.append('files', f);
      try {
        const res = await fetch('/api/books/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) {
          uploadStatus.textContent = `✓ Uploaded: ${data.uploaded.join(', ')}`;
          uploadStatus.className = 'status-ok';
          await loadBooks();
        } else {
          uploadStatus.textContent = `✗ ${data.error}`;
          uploadStatus.className = 'status-err';
        }
      } catch {
        uploadStatus.textContent = '✗ Upload failed.';
        uploadStatus.className = 'status-err';
      }
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('over');
      uploadFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => {
      uploadFiles(fileInput.files);
      fileInput.value = '';
    });

    // ── Users ─────────────────────────────────────────────
    const userList = document.getElementById('user-list');
    const usersEmpty = document.getElementById('users-empty');
    const expandedData = {};

    function relativeTime(timestamp) {
      const diff = Math.floor(Date.now() / 1000) - timestamp;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/users');
        if (!res.ok) { usersLoaded = false; return; }
        const users = await res.json();
        usersLoaded = true;
        renderUsers(users);
      } catch {
        usersLoaded = false;
      }
    }

    function renderUsers(users) {
      userList.innerHTML = '';
      if (users.length === 0) {
        usersEmpty.style.display = '';
        return;
      }
      usersEmpty.style.display = 'none';
      users.forEach(u => {
        const li = document.createElement('li');
        li.className = 'user-row';
        li.innerHTML = `
          <div class="user-header">
            <span class="user-chevron">▶</span>
            <span class="user-name">${esc(u.username)}</span>
            <span class="user-meta">${esc(u.progressCount)} synced</span>
            <button class="delete-btn" type="button" title="Delete user">🗑</button>
          </div>
          <ul class="progress-list" style="display:none"></ul>
        `;
        li.querySelector('.user-header').addEventListener('click', e => {
          if (e.target.closest('.delete-btn')) return;
          toggleUser(u.username, li);
        });
        li.querySelector('.delete-btn').addEventListener('click', () => deleteUser(u.username, li));
        userList.appendChild(li);
      });
    }

    async function toggleUser(username, li) {
      const progressList = li.querySelector('.progress-list');
      const chevron = li.querySelector('.user-chevron');
      if (progressList.style.display !== 'none') {
        progressList.style.display = 'none';
        chevron.textContent = '▶';
        return;
      }
      if (!expandedData[username]) {
        const res = await fetch(`/api/users/${encodeURIComponent(username)}/progress`);
        expandedData[username] = await res.json();
      }
      progressList.innerHTML = '';
      if (expandedData[username].length === 0) {
        progressList.innerHTML = '<li class="progress-empty">No progress records.</li>';
      } else {
        expandedData[username].forEach(p => {
          const item = document.createElement('li');
          item.className = 'progress-item';
          item.innerHTML = `
            <span class="prog-doc">${esc(p.document)}</span>
            <span class="prog-pct">${Math.round(p.percentage * 100)}%</span>
            <button class="delete-btn" type="button" title="Clear progress" style="grid-column:3;align-self:start">🗑</button>
            <span class="prog-meta">${esc(p.device)} · ${relativeTime(p.timestamp)}</span>
          `;
          item.querySelector('.delete-btn').addEventListener('click', () => clearAdminProgress(username, p.document, item, li));
          progressList.appendChild(item);
        });
      }
      progressList.style.display = '';
      chevron.textContent = '▼';
    }

    async function deleteUser(username, li) {
      if (!confirm(`Delete user "${esc(username)}" and all their reading progress?`)) return;
      const res = await fetch(`/api/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
      if (res.status === 204) {
        li.remove();
        if (!userList.querySelector('.user-row')) usersEmpty.style.display = '';
      } else {
        alert('Failed to delete user.');
      }
    }

    async function clearAdminProgress(username, docId, item, userLi) {
      if (!confirm(`Clear progress for "${docId}" for user "${username}"?`)) return;
      const res = await fetch(
        '/api/users/' + encodeURIComponent(username) + '/progress/' + encodeURIComponent(docId),
        { method: 'DELETE' }
      );
      if (res.status === 204) {
        item.remove();
        delete expandedData[username];
        const metaEl = userLi.querySelector('.user-meta');
        if (metaEl) {
          const current = parseInt(metaEl.textContent, 10);
          if (!isNaN(current)) metaEl.textContent = (current - 1) + ' synced';
        }
      } else {
        alert('Failed to clear progress.');
      }
    }

    // ── Register User ─────────────────────────────────────
    const regUsername = document.getElementById('reg-username');
    const regPassword = document.getElementById('reg-password');
    const regBtn = document.getElementById('reg-btn');
    const regStatus = document.getElementById('reg-status');

    [regUsername, regPassword].forEach(el =>
      el.addEventListener('keydown', e => { if (e.key === 'Enter') regBtn.click(); })
    );

    regBtn.addEventListener('click', async () => {
      const username = regUsername.value.trim();
      const password = regPassword.value;
      regStatus.textContent = '';
      regStatus.className = '';
      if (!username || !password) {
        regStatus.textContent = '✗ Username and password are required';
        regStatus.className = 'status-err';
        return;
      }
      regBtn.disabled = true;
      regBtn.textContent = 'Registering…';
      try {
        const res = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.status === 201) {
          regStatus.textContent = '✓ User registered';
          regStatus.className = 'status-ok';
          regUsername.value = '';
          regPassword.value = '';
          await loadUsers();
        } else if (res.status === 409) {
          regStatus.textContent = '✗ Username already taken';
          regStatus.className = 'status-err';
        } else {
          regStatus.textContent = `✗ ${data.error || 'Registration failed'}`;
          regStatus.className = 'status-err';
        }
      } catch {
        regStatus.textContent = '✗ Registration failed';
        regStatus.className = 'status-err';
      } finally {
        regBtn.disabled = false;
        regBtn.textContent = 'Register';
      }
    });

    let progressMap = new Map();
    let cachedBooks = [];
    let currentUser = { username: '', isAdmin: false };

    async function init() {
      try {
        const res = await fetch('/api/me');
        if (res.ok) currentUser = await res.json();
      } catch { /* keep defaults */ }

      document.getElementById('current-username').textContent = currentUser.username;

      if (!currentUser.isAdmin) {
        document.body.classList.add('user-mode');
      }

      await loadBooks();
    }

    init();

    // ── Scan ─────────────────────────────────────────────
    const scanBtn = document.getElementById('scan-btn');
    const scanStatus = document.getElementById('scan-status');

    function setUploadEnabled(enabled) {
      dropZone.style.opacity = enabled ? '' : '0.5';
      dropZone.style.pointerEvents = enabled ? '' : 'none';
      fileInput.disabled = !enabled;
    }

    scanBtn.addEventListener('click', async () => {
      scanBtn.disabled = true;
      scanBtn.textContent = 'Scanning…';
      scanStatus.textContent = '';
      scanStatus.className = '';
      setUploadEnabled(false);
      try {
        const res = await fetch('/api/books/scan', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          const total = data.imported.length + data.removed.length;
          scanStatus.textContent = total === 0
            ? '✓ Library already up to date'
            : `✓ Scan complete: ${data.imported.length} imported, ${data.removed.length} removed`;
          scanStatus.className = 'status-ok';
          await loadBooks();
        } else {
          scanStatus.textContent = '✗ Scan failed';
          scanStatus.className = 'status-err';
        }
      } catch {
        scanStatus.textContent = '✗ Scan failed';
        scanStatus.className = 'status-err';
      } finally {
        scanBtn.disabled = false;
        scanBtn.textContent = 'Scan Library';
        setUploadEnabled(true);
      }
    });
  </script>
</body>
</html>
